<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="02-calculator.css">
</head>
<body>
    <div class="calculator-container">
        <h1>CALCULATOR</h1>
        <div class="display-container">
            <input type="text" id="display" disabled />
            <div class="output" id="output"></div>
        </div>
        <div class="button-container">
            <button >1</button>
            <button >2</button>
            <button >3</button>
            <button class="operators" id="addition" >+</button>
        </div>
        <div class="button-container">
            <button >4</button>
            <button >5</button>
            <button >6</button>
            <button class="operators" id="subtraction" >-</button>
        </div>
        <div class="button-container">
            <button >7</button>
            <button >8</button>
            <button >9</button>
            <button class="operators" id="multiplication">*</button>
        </div>
        <div class="button-container">
            <button >0</button>
            <button id="dot">.</button>
            <button id="percentage" >%</button>
            <button class="operators" id="divide" >/</button>
        </div>
        <div class="button-container">
            <button  class="functions" id="clear" >clear</button>
            <button  class="functions" id="delete" >del</button>
            <button class="functions" id="equal" >=</button>
        </div>
    </div>
    <script src="02-calculator.js"></script>
</body>
</html>
